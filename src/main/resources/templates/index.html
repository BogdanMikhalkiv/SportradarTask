<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Events</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">SportRadar</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">

                <li class="nav-item">
                    <a class="nav-link active" href="#">Events</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#">Teams</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#">Results</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#">Sports</a>
                </li>

            </ul>
        </div>
    </div>
</nav>

<!--CONTENT -->
<div class="container mt-4">

    <h2 class="mb-4">Events List</h2>

    <table class="table table-striped table-bordered">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Status</th>
            <th>Day</th>
            <th>Date</th>
            <th>Time</th>
            <th>Sport</th>
            <th>Home Team</th>
            <th>Away Team</th>

        </tr>
        </thead>

        <tbody>
        <tr th:each="event : ${events}">
            <td th:text="${event.eventId}"></td>
            <td th:text="${event.eventStatus}"></td>
            <td th:text="${event.eventDayOfTheWeek}"></td>
            <td th:text="${event.eventDateVenue}"></td>
            <td th:text="${event.eventTimeVenueUTC}"></td>
            <td th:text="${event.sportName}"></td>
            <td th:text="${event.homeTeamName}"></td>
            <td th:text="${event.awayTeamName}"></td>
        </tr>
        </tbody>
    </table>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
